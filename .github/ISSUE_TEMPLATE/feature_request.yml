name: Feature request
description: 機能追加や改善を提案します
title: "[Feature]: "
labels: [enhancement]
body:
  - type: textarea
    id: problem
    attributes:
      label: 解決したいこと
      description: どのような作業で困っているかを記載してください。
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: 提案する動作
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: 代替案
